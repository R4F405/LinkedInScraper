<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Test Profile</title></head>
<body>
  <!-- Nombre -->
  <h1 class="text-heading-xlarge">Maria García López</h1>

  <!-- Headline + Localización -->
  <div class="ph5">
    <div class="pv-text-details__left-panel">
      <div class="text-body-medium break-words">Senior Software Engineer at Acme Corp</div>
      <span class="text-body-small inline t-black--light break-words">Barcelona, Cataluña, España</span>
    </div>
  </div>

  <!-- Email (visible en overlay de contacto) -->
  <section class="pv-contact-info__contact-type ci-email">
    <a href="mailto:maria.garcia@example.com">maria.garcia@example.com</a>
  </section>

  <!-- Experiencia laboral -->
  <section id="experience">
    <span>Experience</span>
    <ul class="pvs-list__outer-container">
      <li class="artdeco-list__item">
        <div class="pvs-entity">
          <span aria-hidden="true">Software Engineer</span>
          <span aria-hidden="true">Acme Corp</span>
          <span aria-hidden="true">2022 - Present</span>
        </div>
      </li>
    </ul>
  </section>

  <!-- Educación -->
  <section id="education">
    <span>Education</span>
    <ul class="pvs-list__outer-container">
      <li class="artdeco-list__item pv-education-entity">
        <div class="pvs-entity">
          <span aria-hidden="true" class="pv-entity__school-name">Universitat Politècnica de Catalunya</span>
          <span aria-hidden="true">Ingeniería Informática</span>
        </div>
      </li>
    </ul>
  </section>
</body>
</html>
